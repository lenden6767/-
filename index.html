```html
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Firebase App</title>
</head>
<body>

  <h2>Форма отправки данных</h2>

  <form id="requestForm">
    <input type="text" id="name" placeholder="Ваше имя" required><br><br>
    <input type="email" id="email" placeholder="Ваш Email" required><br><br>
    <button type="submit">Отправить</button>
  </form>

  <p id="status"></p>

  <script type="module">
    // 🔹 Импорт Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // 🔹 ТВОЯ конфигурация
    const firebaseConfig = {
      apiKey: "AIzaSyBoZboFW9AEfuQu9B61zWVHtsu1tGUGt5s",
      authDomain: "plas-e449b.firebaseapp.com",
      projectId: "plas-e449b",
      storageBucket: "plas-e449b.firebasestorage.app",
      messagingSenderId: "108896604722",
      appId: "1:108896604722:web:cbf1cf5c0defc450cca22b"
    };

    // 🔹 Инициализация
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 🔹 Работа с формой
    const form = document.getElementById("requestForm");
    const status = document.getElementById("status");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;

      try {
        await addDoc(collection(db, "requests"), {
          name: name,
          email: email,
          createdAt: new Date()
        });

        status.textContent = "✅ Данные успешно отправлены!";
        form.reset();

      } catch (error) {
        console.error("Ошибка:", error);
        status.textContent = "❌ Ошибка отправки!";
      }
    });
  </script>

</body>
</html>
