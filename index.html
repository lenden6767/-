<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firebase Feed — Google Auth + картинки </title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* Карточка профиля */
    .profile-card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .user-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
    }

    .user-name {
      font-weight: bold;
      font-size: 18px;
    }

    .user-email {
      font-size: 12px;
      color: gray;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 30px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: bold;
    }

    .btn-google {
      background: #4285f4;
      color: white;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-google:hover {
      background: #3367d6;
      transform: scale(1.02);
    }

    .btn-logout {
      background: #dc3545;
      color: white;
    }

    .btn-logout:hover {
      background: #c82333;
    }

    /* Форма добавления поста */
    .post-form {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }

    .post-form.hidden {
      display: none;
    }

    .post-form input, .post-form textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 10px;
      font-family: inherit;
      resize: vertical;
    }

    .post-form input:focus, .post-form textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .form-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .file-label {
      background: #f0f0f0;
      padding: 10px 15px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .file-label:hover {
      background: #e0e0e0;
    }

    .btn-submit {
      background: #667eea;
      color: white;
      flex: 1;
    }

    .btn-submit:hover {
      background: #5a67d8;
    }

    .image-preview {
      margin-top: 10px;
      max-width: 100%;
      max-height: 150px;
      border-radius: 12px;
      display: none;
    }

    /* Лента постов */
    .feed {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .post {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      transition: transform 0.2s ease;
    }

    .post:hover {
      transform: translateY(-2px);
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 15px;
    }

    .post-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }

    .post-author {
      font-weight: bold;
      font-size: 14px;
    }

    .post-time {
      font-size: 11px;
      color: gray;
    }

    .post-text {
      font-size: 16px;
      margin-bottom: 15px;
      line-height: 1.5;
    }

    .post-image {
      max-width: 100%;
      border-radius: 12px;
      margin-bottom: 15px;
      max-height: 300px;
    }

    .post-actions {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .like-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #666;
      transition: all 0.2s;
    }

    .like-btn:hover {
      color: #e0245e;
      transform: scale(1.05);
    }

    .like-btn.liked {
      color: #e0245e;
    }

    .error-msg {
      color: #dc3545;
      font-size: 12px;
      margin-top: 10px;
      text-align: center;
    }

    .loading {
      text-align: center;
      color: white;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Профиль -->
    <div class="profile-card" id="profileCard">
      <div class="user-info" id="userInfo">
        <img class="user-avatar" id="userAvatar" src="https://via.placeholder.com/50" alt="Avatar">
        <div>
          <div class="user-name" id="userName">Гость</div>
          <div class="user-email" id="userEmail">Не авторизован</div>
        </div>
      </div>
      <div id="authButtons">
        <button class="btn btn-google" id="loginBtn">
          🚀 Войти через Google
        </button>
      </div>
    </div>

    <!-- Форма добавления поста -->
    <div class="post-form hidden" id="postForm">
      <textarea id="postText" rows="3" placeholder="Что у вас нового?"></textarea>
      <input type="file" id="imageInput" accept="image/*">
      <img id="imagePreview" class="image-preview">
      <div class="form-actions">
        <label class="file-label" for="imageInput">📷 Добавить фото</label>
        <button class="btn btn-submit" id="submitBtn">📤 Опубликовать</button>
      </div>
      <div id="formError" class="error-msg"></div>
    </div>

    <!-- Лента -->
    <div class="feed" id="feed">
      <div class="loading">Загрузка постов...</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { 
      getAuth, 
      signInWithPopup, 
      GoogleAuthProvider, 
      signOut, 
      onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      collection,
      addDoc,
      query,
      orderBy,
      onSnapshot,
      doc,
      updateDoc,
      increment,
      serverTimestamp,
      deleteDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import {
      getStorage,
      ref,
      uploadBytes,
      getDownloadURL
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    // Конфигурация Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyBoZboFW9AEfuQu9B61zWVHtsu1tGUGt5s",
      authDomain: "plas-e449b.firebaseapp.com",
      projectId: "plas-e449b",
      storageBucket: "plas-e449b.firebasestorage.app",
      messagingSenderId: "108896604722",
      appId: "1:108896604722:web:cbf1cf5c0defc450cca22b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const provider = new GoogleAuthProvider();

    // DOM элементы
    const loginBtn = document.getElementById("loginBtn");
    const userAvatar = document.getElementById("userAvatar");
    const userName = document.getElementById("userName");
    const userEmail = document.getElementById("userEmail");
    const postForm = document.getElementById("postForm");
    const submitBtn = document.getElementById("submitBtn");
    const postText = document.getElementById("postText");
    const imageInput = document.getElementById("imageInput");
    const imagePreview = document.getElementById("imagePreview");
    const formError = document.getElementById("formError");
    const feed = document.getElementById("feed");

    let currentUser = null;

    // 🔐 Функция входа через Google
    window.loginWithGoogle = async function() {
      try {
        const result = await signInWithPopup(auth, provider);
        console.log("✅ Вошли как:", result.user.displayName);
        formError.innerHTML = "";
      } catch (error) {
        console.error("Ошибка входа:", error);
        formError.innerHTML = "❌ Ошибка входа: " + error.message;
      }
    };

    // Функция выхода
    window.logout = async function() {
      try {
        await signOut(auth);
        console.log("✅ Вышли из аккаунта");
      } catch (error) {
        console.error("Ошибка выхода:", error);
      }
    };

    // Обновление UI в зависимости от статуса авторизации
    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      const authButtons = document.getElementById("authButtons");

      if (user) {
        // Пользователь авторизован
        userAvatar.src = user.photoURL || "https://via.placeholder.com/50";
        userName.textContent = user.displayName || "Пользователь";
        userEmail.textContent = user.email || "";
        authButtons.innerHTML = `<button class="btn btn-logout" id="logoutBtn">🚪 Выйти</button>`;
        document.getElementById("logoutBtn").onclick = logout;
        postForm.classList.remove("hidden");
        formError.innerHTML = "";
      } else {
        // Пользователь не авторизован
        userAvatar.src = "https://via.placeholder.com/50";
        userName.textContent = "Гость";
        userEmail.textContent = "Не авторизован";
        authButtons.innerHTML = `<button class="btn btn-google" id="loginBtn">🚀 Войти через Google</button>`;
        document.getElementById("loginBtn").onclick = loginWithGoogle;
        postForm.classList.add("hidden");
      }
    });

    // 🖼️ Предпросмотр изображения
    imageInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          imagePreview.src = event.target.result;
          imagePreview.style.display = "block";
        };
        reader.readAsDataURL(file);
      } else {
        imagePreview.style.display = "none";
      }
    });

    // 📝 Публикация поста (с картинкой)
    submitBtn.onclick = async () => {
      if (!currentUser) {
        formError.innerHTML = "❌ Вы не авторизованы! Войдите через Google.";
        return;
      }

      const text = postText.value.trim();
      if (!text) {
        formError.innerHTML = "❌ Напишите текст поста!";
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "⏳ Публикация...";

      try {
        let imageUrl = null;
        const imageFile = imageInput.files[0];

        // Загружаем картинку в Storage
        if (imageFile) {
          const timestamp = Date.now();
          const storageRef = ref(storage, `posts/${timestamp}_${imageFile.name}`);
          await uploadBytes(storageRef, imageFile);
          imageUrl = await getDownloadURL(storageRef);
        }

        // Сохраняем пост в Firestore
        await addDoc(collection(db, "posts"), {
          text: text,
          likes: 0,
          authorId: currentUser.uid,
          authorName: currentUser.displayName || "Аноним",
          authorAvatar: currentUser.photoURL || "",
          imageUrl: imageUrl,
          timestamp: serverTimestamp()
        });

        // Очищаем форму
        postText.value = "";
        imageInput.value = "";
        imagePreview.style.display = "none";
        formError.innerHTML = "";
      } catch (error) {
        console.error("Ошибка публикации:", error);
        formError.innerHTML = "❌ Ошибка: " + error.message;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "📤 Опубликовать";
      }
    };

    // ❤️ Лайк поста
    window.likePost = async (postId, currentLikes) => {
      if (!currentUser) {
        alert("❌ Войдите в аккаунт, чтобы ставить лайки!");
        return;
      }

      try {
        const postRef = doc(db, "posts", postId);
        await updateDoc(postRef, {
          likes: increment(1)
        });
      } catch (error) {
        console.error("Ошибка лайка:", error);
      }
    };

    // 🗑️ Удаление поста (только для автора)
    window.deletePost = async (postId) => {
      if (!currentUser) return;
      
      if (confirm("Удалить пост?")) {
        try {
          await deleteDoc(doc(db, "posts", postId));
        } catch (error) {
          console.error("Ошибка удаления:", error);
        }
      }
    };

    // 📡 Real-time лента
    const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));

    onSnapshot(q, (snapshot) => {
      if (snapshot.empty) {
        feed.innerHTML = '<div class="loading">📭 Нет постов. Будьте первым!</div>';
        return;
      }

      feed.innerHTML = "";
      snapshot.forEach((docSnap) => {
        const data = docSnap.data();
        const postId = docSnap.id;
        const isAuthor = currentUser && data.authorId === currentUser.uid;
        const postDate = data.timestamp?.toDate() || new Date();

        const postDiv = document.createElement("div");
        postDiv.className = "post";
        postDiv.innerHTML = `
          <div class="post-header">
            <img class="post-avatar" src="${data.authorAvatar || 'https://via.placeholder.com/40'}" alt="avatar">
            <div>
              <div class="post-author">${data.authorName || "Аноним"}</div>
              <div class="post-time">${postDate.toLocaleString()}</div>
            </div>
            ${isAuthor ? `<button class="delete-btn" onclick="deletePost('${postId}')" style="margin-left:auto; background:#fee; border:none; padding:5px 10px; border-radius:20px; cursor:pointer;">🗑️</button>` : ''}
          </div>
          <div class="post-text">${escapeHtml(data.text)}</div>
          ${data.imageUrl ? `<img class="post-image" src="${data.imageUrl}" alt="post image">` : ''}
          <div class="post-actions">
            <button class="like-btn" onclick="likePost('${postId}', ${data.likes || 0})">
              ❤️ <span>${data.likes || 0}</span>
            </button>
          </div>
        `;
        feed.appendChild(postDiv);
      });
    });

    // Защита от XSS
    function escapeHtml(str) {
      if (!str) return "";
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    console.log("%c🛡️ Сайт защищён! Google Auth + Rules + Storage", "color: green; font-size: 14px");
  </script>
</body>
</html>
